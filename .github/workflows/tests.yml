---
name: Tests

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    pytest:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out the code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                  version: latest

            - name: Set up Python 3.10
              run: uv python install 3.10

            - name: Sync dependencies (runtime + dev)
              # uv reads `[tool.uv] no-build-isolation-package` from
              # pyproject.toml (currently `torch`, `torchvision`); no
              # global `--no-build-isolation` is needed and would break
              # transitive deps like `wget` that require setuptools at
              # build time.
              run: uv sync

            - name: Run tests
              run: uv run pytest tests/ -v
