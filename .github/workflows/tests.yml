---
name: Tests

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    pytest:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out the code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                  version: latest

            - name: Set up Python 3.10
              run: uv python install 3.10

            - name: Sync dependencies (runtime + dev)
              run: uv sync --no-build-isolation

            - name: Run tests
              run: uv run --no-build-isolation pytest tests/ -v
